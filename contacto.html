<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Real Madrid FanZone</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/contacto.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Barlow:wght@100;200;300;400;500;600;700;800;900&family=Bebas+Neue&display=swap"
        rel="stylesheet">

    <link
        href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
        rel="stylesheet">
</head>

<body>


    <header class="header">

        <div class="header-border"></div>

        <nav class="navbar-container">

            <a href="/index.html" class="logo">
                <img src="https://upload.wikimedia.org/wikipedia/en/thumb/5/56/Real_Madrid_CF.svg/960px-Real_Madrid_CF.svg.png"
                    alt="Logo Real Madrid">
            </a>

            <div class="navbar">

                <ul>

                    <li>
                        <a href="index.html">
                            <i class="ri-home-line"></i>
                            <span>Inicio</span>
                        </a>
                    </li>

                    <li>
                        <a href="jugadores.html">
                            <i class="ri-team-line"></i>
                            <span>Jugadores</span>
                        </a>
                    </li>

                    <li>
                        <a href="contacto.html">
                            <i class="ri-mail-line"></i>
                            <span>Contacto</span>
                        </a>
                    </li>

                </ul>

                <button id="theme-toggle">
                    <i class="ri-moon-line"></i>
                </button>

            </div>

        </nav>

    </header>

    <main>


        <section class="contact-banner">

            <div class="banner-content">

                <h1>CONTACTO</h1>

                <p>
                    Envíanos tu mensaje y comparte tu pasión por el Real Madrid.
                </p>

            </div>

        </section>

        <section class="contact">

            <div class="section-title">
                <h2>Formulario de Contacto</h2>
            </div>

            <div class="contact-container">

                <form class="contact-form" id="contactForm">


                    <div class="input-group">

                        <label for="nombre">
                            Nombre
                        </label>

                        <input
                            type="text"
                            id="nombre"
                            placeholder="Ingresa tu nombre">

                    </div>


                    <div class="input-group">

                        <label for="correo">
                            Correo Electrónico
                        </label>

                        <input
                            type="email"
                            id="correo"
                            placeholder="Ingresa tu correo">

                    </div>


                    <div class="input-group">

                        <label for="mensaje">
                            Mensaje
                        </label>

                        <textarea
                            id="mensaje"
                            rows="6"
                            placeholder="Escribe tu mensaje"></textarea>

                    </div>

                    <button type="submit" class="btn">
                        Enviar Mensaje
                    </button>

                </form>

            </div>

        </section>

    </main>

    <footer class="footer">

        <p>
            © 2026 Real Madrid FanZone | Diseñado por Edwin Suarez
        </p>

    </footer>

    <!-- JS -->
    <script src="/js/app.js"></script>

</body>

</html>
